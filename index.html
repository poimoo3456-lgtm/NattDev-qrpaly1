<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>QR Manager Pro</title>
  
  <!-- Scripts -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;700;900&display=swap" rel="stylesheet">
  
  <style>
    body { 
      font-family: 'Kanit', sans-serif; 
      -webkit-tap-highlight-color: transparent; 
      touch-action: manipulation; 
      background-color: #f8fafc;
    }
    input { font-size: 16px !important; } /* ป้องกัน iPhone auto-zoom */
    .animate-slide-up { animation: slideUp 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
    @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
    .no-scrollbar::-webkit-scrollbar { display: none; }
  </style>
</head>
<body class="overflow-hidden">
  <div id="root"></div>

  <script>
    const { useState, useEffect } = React;
    const e = React.createElement;

    // --- SVG Icons ---
    const Icons = {
      Qr: (p) => e('svg', { ...p, width: 24, height: 24, viewBox: "0 0 24 24", fill: "none", stroke: "currentColor", strokeWidth: 2.5, strokeLinecap: "round", strokeLinejoin: "round" },
        e('rect', { x: 3, y: 3, width: 7, height: 7 }), e('rect', { x: 14, y: 3, width: 7, height: 7 }),
        e('rect', { x: 14, y: 14, width: 7, height: 7 }), e('rect', { x: 3, y: 14, width: 7, height: 7 })),
      Plus: (p) => e('svg', { ...p, width: 24, height: 24, viewBox: "0 0 24 24", fill: "none", stroke: "currentColor", strokeWidth: 3 },
        e('line', { x1: 12, y1: 5, x2: 12, y2: 19 }), e('line', { x1: 5, y1: 12, x2: 19, y2: 12 })),
      Back: (p) => e('svg', { ...p, width: 24, height: 24, viewBox: "0 0 24 24", fill: "none", stroke: "currentColor", strokeWidth: 2.5 },
        e('path', { d: "m15 18-6-6 6-6" })),
      Check: (p) => e('svg', { ...p, width: 20, height: 20, viewBox: "0 0 24 24", fill: "none", stroke: "currentColor", strokeWidth: 3 },
        e('polyline', { points: "20 6 9 17 4 12" }))
    };

    // --- PromptPay Logic ---
    const getPayload = (id, amt) => {
      const cleanId = id.replace(/[^0-9]/g, "");
      let p = "0002010102110016A000000677010111";
      if (cleanId.length === 10) p += "01140066" + cleanId.substring(1);
      else if (cleanId.length === 13) p += "0213" + cleanId;
      else return "";
      p += "5802TH5303764";
      if (amt && parseFloat(amt) > 0) {
        const val = parseFloat(amt).toFixed(2);
        p += "54" + val.length.toString().padStart(2, "0") + val;
      }
      p += "6304";
      const crc16 = (s) => {
        let c = 0xFFFF;
        for (let i = 0; i < s.length; i++) {
          let x = ((c >> 8) ^ s.charCodeAt(i)) & 0xFF;
          x ^= x >> 4;
          c = ((c << 8) ^ (x << 12) ^ (x << 5) ^ x) & 0xFFFF;
        }
        return (c & 0xFFFF).toString(16).toUpperCase().padStart(4, "0");
      };
      return p + crc16(p);
    };

    const App = () => {
      const [view, setView] = useState('home');
      const [accounts, setAccounts] = useState([]);
      const [amount, setAmount] = useState('');
      const [selected, setSelected] = useState(null);
      const [qrData, setQrData] = useState(null);
      const [isAdding, setIsAdding] = useState(false);
      const [newAcc, setNewAcc] = useState({ name: '', id: '' });

      // โหลดข้อมูลจาก LocalStorage (เฉพาะตอนรันบนเว็บปกติ)
      useEffect(() => {
        const saved = localStorage.getItem('qr_accounts');
        if (saved) setAccounts(JSON.parse(saved));
      }, []);

      const saveToLocal = (data) => {
        localStorage.setItem('qr_accounts', JSON.stringify(data));
      };

      const handleAddAccount = () => {
        if (!newAcc.name || !newAcc.id) return;
        const updated = [...accounts, { ...newAcc, uid: Date.now() }];
        setAccounts(updated);
        saveToLocal(updated);
        setNewAcc({ name: '', id: '' });
        setIsAdding(false);
      };

      if (view === 'home') return e('div', { className: "h-screen max-w-md mx-auto flex flex-col bg-slate-50 shadow-2xl" },
        e('div', { className: "p-6 pt-10 bg-white border-b border-slate-100" },
          e('h1', { className: "text-2xl font-black text-slate-900" }, "QR Manager")
        ),
        e('div', { className: "flex-1 overflow-y-auto p-6 space-y-6" },
          e('div', { className: "bg-indigo-600 p-8 rounded-[40px] text-white shadow-xl shadow-indigo-100" },
            e('p', { className: "text-xs font-bold opacity-60 mb-1" }, "ยินดีต้อนรับ"),
            e('h2', { className: "text-2xl font-black mb-6" }, "จัดการบัญชีรับเงิน"),
            e('button', { 
              onClick: () => setIsAdding(true),
              className: "w-full py-4 bg-white/20 rounded-2xl font-bold flex items-center justify-center gap-2 backdrop-blur-sm active:scale-95 transition-all"
            }, e(Icons.Plus), "เพิ่มบัญชีใหม่")
          ),
          e('div', { className: "space-y-3" },
            e('h3', { className: "text-xs font-bold text-slate-400 uppercase tracking-widest px-2" }, "บัญชีของคุณ"),
            accounts.length === 0 ? e('div', { className: "py-16 text-center text-slate-300 border-2 border-dashed border-slate-200 rounded-[40px]" }, "ยังไม่มีข้อมูลบัญชี") :
            accounts.map(acc => e('button', {
              key: acc.uid,
              onClick: () => { setSelected(acc); setView('input'); },
              className: "w-full bg-white p-6 rounded-[32px] flex items-center justify-between border border-slate-100 shadow-sm active:scale-95 transition-all"
            }, 
              e('div', { className: "text-left" },
                e('p', { className: "font-black text-slate-800" }, acc.name),
                e('p', { className: "text-xs text-slate-400 font-bold" }, acc.id)
              ),
              e('div', { className: "text-indigo-600" }, e(Icons.Qr))
            ))
          )
        ),
        isAdding && e('div', { className: "fixed inset-0 bg-slate-900/60 z-[100] flex items-end" },
          e('div', { className: "bg-white w-full max-w-md mx-auto rounded-t-[48px] p-8 pb-12 animate-slide-up shadow-2xl" },
            e('h3', { className: "text-xl font-black mb-6 text-center" }, "เพิ่มบัญชี PromptPay"),
            e('div', { className: "space-y-4 mb-8" },
              e('input', { 
                placeholder: "ชื่อเรียกบัญชี (เช่น ออมทรัพย์)", 
                className: "w-full p-4 bg-slate-50 rounded-2xl border border-slate-100 outline-none font-bold",
                value: newAcc.name,
                onChange: ev => setNewAcc({...newAcc, name: ev.target.value})
              }),
              e('input', { 
                placeholder: "เบอร์โทรศัพท์ หรือ เลขบัตร ปชช.", 
                inputMode: "numeric",
                className: "w-full p-4 bg-slate-50 rounded-2xl border border-slate-100 outline-none font-bold",
                value: newAcc.id,
                onChange: ev => setNewAcc({...newAcc, id: ev.target.value.replace(/[^0-9]/g, '')})
              })
            ),
            e('div', { className: "flex gap-4" },
              e('button', { onClick: () => setIsAdding(false), className: "flex-1 py-4 font-bold text-slate-400" }, "ยกเลิก"),
              e('button', { 
                className: "flex-1 py-4 bg-indigo-600 text-white rounded-2xl font-bold shadow-lg shadow-indigo-100",
                onClick: handleAddAccount
              }, "บันทึกข้อมูล")
            )
          )
        )
      );

      if (view === 'input') return e('div', { className: "h-screen max-w-md mx-auto flex flex-col bg-white" },
        e('div', { className: "p-6 pt-10 flex items-center gap-4 border-b border-slate-50" },
          e('button', { onClick: () => setView('home'), className: "p-2 -ml-2 text-slate-300" }, e(Icons.Back)),
          e('h1', { className: "text-xl font-black" }, "ระบุจำนวนเงิน")
        ),
        e('div', { className: "flex-1 p-6 flex flex-col gap-8" },
          e('div', { className: "bg-slate-50 p-10 rounded-[48px] text-center space-y-2 border border-slate-100" },
            e('p', { className: "text-xs font-bold text-slate-400 uppercase" }, "ใส่ยอดเงินที่ต้องการรับ"),
            e('div', { className: "flex items-center justify-center gap-2" },
              e('span', { className: "text-3xl font-black text-indigo-300" }, "฿"),
              e('input', {
                autoFocus: true,
                inputMode: "decimal",
                placeholder: "0.00",
                className: "bg-transparent text-6xl font-black outline-none w-full max-w-[220px] text-center",
                value: amount,
                onChange: ev => {
                  const val = ev.target.value;
                  if (val === '' || /^[0-9]*\.?[0-9]*$/.test(val)) setAmount(val);
                }
              })
            )
          ),
          e('div', { className: "p-6 bg-indigo-50/50 rounded-3xl border border-indigo-100" },
            e('p', { className: "text-[10px] font-bold text-indigo-400 uppercase tracking-widest mb-1" }, "รับเงินเข้าบัญชี"),
            e('p', { className: "text-lg font-black text-slate-800" }, selected?.name),
            e('p', { className: "text-sm font-bold text-slate-400" }, selected?.id)
          ),
          e('button', {
            disabled: !amount,
            onClick: () => { setQrData(getPayload(selected.id, amount)); setView('qr'); },
            className: "w-full py-5 bg-indigo-600 text-white rounded-[32px] font-black text-xl shadow-xl shadow-indigo-100 disabled:opacity-20 transition-all"
          }, "สร้าง QR Code")
        )
      );

      if (view === 'qr') return e('div', { className: "h-screen max-w-md mx-auto flex flex-col bg-slate-900 text-white" },
        e('div', { className: "p-8 pt-12 flex justify-between items-center" },
          e('button', { onClick: () => setView('input'), className: "p-2 bg-white/10 rounded-full" }, e(Icons.Back)),
          e('span', { className: "text-xs font-bold opacity-40 uppercase tracking-widest" }, "Scan to Pay")
        ),
        e('div', { className: "flex-1 flex flex-col items-center justify-center p-8 text-center" },
          e('div', { className: "bg-white p-6 rounded-[56px] shadow-2xl mb-10" },
            e('img', { 
              src: `https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=${encodeURIComponent(qrData)}`,
              className: "w-64 h-64"
            })
          ),
          e('h2', { className: "text-6xl font-black mb-2" }, "฿" + parseFloat(amount).toLocaleString(undefined, { minimumFractionDigits: 2 })),
          e('p', { className: "text-xl font-bold text-indigo-400" }, selected.name),
          e('p', { className: "text-sm opacity-30" }, selected.id)
        ),
        e('div', { className: "p-8" },
          e('button', {
            onClick: () => { setView('home'); setAmount(''); },
            className: "w-full py-6 bg-white text-slate-900 rounded-[32px] font-black text-xl shadow-xl shadow-white/5"
          }, "เสร็จสิ้น")
        )
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(e(App));
  </script>
</body>
</html>
