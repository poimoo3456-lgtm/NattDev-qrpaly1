<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>QR Manager Pro | NattDev</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600;800&display=swap" rel="stylesheet">
  
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  
  <style>
    body { 
      font-family: 'Kanit', sans-serif; 
      background-color: #f8fafc;
      margin: 0;
      -webkit-tap-highlight-color: transparent;
    }
    .page-in { animation: fadeIn 0.3s ease-out forwards; }
    @keyframes fadeIn {
      from { opacity: 0; transform: scale(0.98); }
      to { opacity: 1; transform: scale(1); }
    }
    input::-webkit-outer-spin-button,
    input::-webkit-inner-spin-button {
      -webkit-appearance: none;
      margin: 0;
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script>
    const { useState, useEffect, createElement: h } = React;

    // --- PromptPay Checksum (CRC16) ---
    const crc16 = (data) => {
      let crc = 0xFFFF;
      for (let i = 0; i < data.length; i++) {
        crc ^= (data.charCodeAt(i) << 8);
        for (let j = 0; j < 8; j++) {
          if ((crc & 0x8000) !== 0) crc = ((crc << 1) ^ 0x1021) & 0xFFFF;
          else crc = (crc << 1) & 0xFFFF;
        }
      }
      return crc.toString(16).toUpperCase().padStart(4, "0");
    };

    const generateQRData = (id, amount) => {
      const target = id.replace(/[^0-9]/g, "");
      let payload = "000201010211";
      let info = "0016A000000677010111";
      if (target.length === 10) info += "01140066" + target.substring(1);
      else if (target.length === 13) info += "0213" + target;
      else return "";

      payload += "29" + info.length.toString().padStart(2, "0") + info;
      payload += "5802TH5303764";
      if (amount && !isNaN(amount) && parseFloat(amount) > 0) {
        const amtStr = parseFloat(amount).toFixed(2);
        payload += "54" + amtStr.length.toString().padStart(2, "0") + amtStr;
      }
      payload += "6304";
      return payload + crc16(payload);
    };

    const App = () => {
      const [view, setView] = useState('home');
      const [accounts, setAccounts] = useState([]);
      const [selected, setSelected] = useState(null);
      const [amount, setAmount] = useState('');
      const [isAddOpen, setIsAddOpen] = useState(false);
      const [newAcc, setNewAcc] = useState({ name: '', id: '' });

      useEffect(() => {
        const saved = localStorage.getItem('nattdev_v4');
        if (saved) setAccounts(JSON.parse(saved));
      }, []);

      const save = (data) => {
        setAccounts(data);
        localStorage.setItem('nattdev_v4', JSON.stringify(data));
      };

      // --- Main Renderers ---
      const Home = () => h('div', { className: "flex flex-col h-screen page-in" },
        h('header', { className: "p-6 bg-white border-b flex justify-between items-center" },
          h('div', null,
            h('h1', { className: "text-2xl font-extrabold text-slate-800" }, "QR Manager Pro"),
            h('p', { className: "text-[10px] font-bold text-indigo-500 tracking-widest" }, "BY NATTDEV")
          ),
          h('button', { onClick: () => setView('settings'), className: "text-xl p-2" }, "⚙️")
        ),
        h('main', { className: "flex-1 overflow-y-auto p-6" },
          h('div', { className: "bg-indigo-600 p-8 rounded-[40px] text-white shadow-xl mb-6" },
            h('h2', { className: "text-xl font-bold mb-4" }, "รับเงินเข้าพร้อมเพย์"),
            h('button', { onClick: () => setIsAddOpen(true), className: "w-full py-4 bg-white/20 rounded-2xl font-bold border border-white/30" }, "+ เพิ่มบัญชีใหม่")
          ),
          h('div', { className: "space-y-3" },
            h('p', { className: "text-xs font-bold text-slate-400 uppercase tracking-widest pl-2" }, "เลือกบัญชีรับเงิน"),
            accounts.map(acc => h('button', {
              key: acc.uid,
              onClick: () => { setSelected(acc); setView('input'); },
              className: "w-full bg-white p-6 rounded-[32px] shadow-sm border flex justify-between items-center active:bg-slate-50"
            },
              h('div', { className: "text-left" },
                h('p', { className: "font-bold text-slate-800" }, acc.name),
                h('p', { className: "text-xs text-slate-400" }, acc.id)
              ),
              h('span', null, "➡️")
            ))
          )
        ),
        isAddOpen && h('div', { className: "fixed inset-0 z-50 flex items-end bg-black/50 p-4 backdrop-blur-sm" },
          h('div', { className: "bg-white w-full rounded-[40px] p-8 pb-10" },
            h('h3', { className: "text-xl font-bold mb-6" }, "บันทึกบัญชี"),
            h('input', { 
              placeholder: "ชื่อเจ้าของบัญชี", 
              className: "w-full p-4 mb-4 bg-slate-50 rounded-2xl border", 
              value: newAcc.name, 
              onChange: e => setNewAcc({...newAcc, name: e.target.value}) 
            }),
            h('input', { 
              placeholder: "เบอร์โทร หรือ เลขบัตร ปชช.", 
              inputMode: "numeric", 
              className: "w-full p-4 mb-8 bg-slate-50 rounded-2xl border font-mono", 
              value: newAcc.id, 
              onChange: e => setNewAcc({...newAcc, id: e.target.value.replace(/[^0-9]/g, '')}) 
            }),
            h('div', { className: "flex gap-4" },
              h('button', { onClick: () => setIsAddOpen(false), className: "flex-1 text-slate-400 font-bold" }, "ยกเลิก"),
              h('button', { 
                onClick: () => {
                  if (!newAcc.name || !newAcc.id) return;
                  const updated = [...accounts, {...newAcc, uid: Date.now()}];
                  save(updated);
                  setNewAcc({name: '', id: ''});
                  setIsAddOpen(false);
                }, 
                className: "flex-1 py-4 bg-indigo-600 text-white rounded-2xl font-bold" 
              }, "บันทึก")
            )
          )
        )
      );

      const InputView = () => h('div', { className: "flex flex-col h-screen bg-white page-in" },
        h('header', { className: "p-6 flex items-center gap-4 border-b" },
          h('button', { onClick: () => setView('home'), className: "text-xl" }, "←"),
          h('h2', { className: "text-xl font-bold" }, "ระบุยอดเงิน")
        ),
        h('main', { className: "flex-1 p-8 flex flex-col items-center justify-center" },
          h('p', { className: "text-slate-400 mb-4" }, "บัญชี: " + selected.name),
          h('div', { className: "flex items-center gap-2 mb-12" },
            h('span', { className: "text-4xl font-bold text-slate-300" }, "฿"),
            h('input', { 
              autoFocus: true, 
              type: "number", 
              step: "any",
              inputMode: "decimal",
              className: "text-6xl font-extrabold text-indigo-600 outline-none w-full text-center", 
              placeholder: "0.00", 
              value: amount, 
              onChange: e => setAmount(e.target.value) 
            })
          ),
          h('button', { 
            onClick: () => setView('qr'), 
            className: "w-full py-5 bg-indigo-600 text-white rounded-[32px] font-bold text-xl shadow-lg" 
          }, "ยืนยัน")
        )
      );

      const QRView = () => {
        const payload = generateQRData(selected.id, amount);
        const qrUrl = `https://api.qrserver.com/v1/create-qr-code/?size=400x400&data=${encodeURIComponent(payload)}`;
        return h('div', { className: "flex flex-col h-screen bg-slate-900 text-white page-in" },
          h('header', { className: "p-8" }, h('button', { onClick: () => setView('input'), className: "text-xl" }, "←")),
          h('main', { className: "flex-1 flex flex-col items-center justify-center p-8 text-center" },
            h('div', { className: "bg-white p-6 rounded-[50px] mb-8" }, 
              h('img', { src: qrUrl, className: "w-64 h-64" })
            ),
            h('h3', { className: "text-5xl font-extrabold mb-4" }, "฿" + (parseFloat(amount || 0).toLocaleString(undefined, {minimumFractionDigits: 2}))),
            h('p', { className: "text-indigo-400 font-bold text-lg" }, selected.name),
            h('p', { className: "text-white/20 text-xs" }, selected.id)
          ),
          h('footer', { className: "p-8" },
            h('button', { onClick: () => { setView('home'); setAmount(''); }, className: "w-full py-5 bg-white text-slate-900 rounded-[32px] font-bold text-xl" }, "กลับหน้าหลัก")
          )
        );
      };

      const Settings = () => h('div', { className: "flex flex-col h-screen bg-white page-in" },
        h('header', { className: "p-6 flex items-center gap-4 border-b" },
          h('button', { onClick: () => setView('home'), className: "text-xl" }, "←"),
          h('h2', { className: "text-xl font-bold" }, "ตั้งค่า")
        ),
        h('main', { className: "p-6 space-y-6" },
          h('div', { className: "space-y-4" },
            h('p', { className: "text-xs font-bold text-slate-400 uppercase tracking-widest" }, "รายการบัญชีทั้งหมด"),
            accounts.map(acc => h('div', { key: acc.uid, className: "flex justify-between items-center p-4 bg-slate-50 rounded-2xl border" },
              h('div', null, h('p', { className: "font-bold" }, acc.name), h('p', { className: "text-xs text-slate-400" }, acc.id)),
              h('button', { onClick: () => save(accounts.filter(a => a.uid !== acc.uid)), className: "text-red-500 font-bold" }, "ลบ")
            ))
          ),
          h('div', { className: "p-10 bg-indigo-50 rounded-[40px] text-center" },
            h('p', { className: "text-indigo-600 font-bold" }, "NattDev Team"),
            h('p', { className: "text-[10px] text-indigo-300 font-bold mt-2" }, "VERSION 4.0.0 STABLE")
          )
        )
      );

      if (view === 'home') return Home();
      if (view === 'input') return InputView();
      if (view === 'qr') return QRView();
      if (view === 'settings') return Settings();
      return null;
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(h(App));
  </script>
</body>
</html>
