<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>QR Manager Pro | NattDev</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600;800&display=swap" rel="stylesheet">
  
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  
  <style>
    body { 
      font-family: 'Kanit', sans-serif; 
      background-color: #f8fafc;
      margin: 0;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }
    .page-in { animation: fadeIn 0.3s ease-out forwards; }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .safe-bottom { padding-bottom: env(safe-area-inset-bottom); }
  </style>
</head>
<body>
  <div id="root"></div>

  <script>
    const { useState, useEffect, useMemo, createElement: h } = React;

    // --- PromptPay Logic ---
    const getCRC16 = (data) => {
      let crc = 0xFFFF;
      for (let i = 0; i < data.length; i++) {
        crc ^= (data.charCodeAt(i) << 8);
        for (let j = 0; j < 8; j++) {
          if ((crc & 0x8000) !== 0) crc = ((crc << 1) ^ 0x1021) & 0xFFFF;
          else crc = (crc << 1) & 0xFFFF;
        }
      }
      return crc.toString(16).toUpperCase().padStart(4, "0");
    };

    const generatePayload = (id, amount) => {
      const target = id.replace(/[^0-9]/g, "");
      let payload = "000201010211";
      let info = "0016A000000677010111";
      if (target.length === 10) info += "01140066" + target.substring(1);
      else if (target.length === 13) info += "0213" + target;
      else return "";

      payload += "29" + info.length.toString().padStart(2, "0") + info;
      payload += "5802TH5303764";
      if (amount && parseFloat(amount) > 0) {
        const amtStr = parseFloat(amount).toFixed(2);
        payload += "54" + amtStr.length.toString().padStart(2, "0") + amtStr;
      }
      payload += "6304";
      return payload + getCRC16(payload);
    };

    const App = () => {
      const [view, setView] = useState('home');
      const [accounts, setAccounts] = useState([]);
      const [selected, setSelected] = useState(null);
      const [amount, setAmount] = useState('');
      const [isAddOpen, setIsAddOpen] = useState(false);
      const [newAcc, setNewAcc] = useState({ name: '', id: '' });

      useEffect(() => {
        try {
          const saved = localStorage.getItem('nattdev_v3_data');
          if (saved) setAccounts(JSON.parse(saved));
        } catch (e) { console.error(e); }
      }, []);

      const save = (data) => {
        setAccounts(data);
        localStorage.setItem('nattdev_v3_data', JSON.stringify(data));
      };

      // --- Views ---
      const renderHome = () => h('div', { className: "flex flex-col h-screen page-in" },
        h('header', { className: "p-6 bg-white border-b flex justify-between items-center" },
          h('div', null,
            h('h1', { className: "text-2xl font-extrabold text-slate-800" }, "QR Manager"),
            h('p', { className: "text-[10px] font-bold text-indigo-500 tracking-widest" }, "BY NATTDEV")
          ),
          h('button', { onClick: () => setView('settings'), className: "p-2 text-slate-400" }, "⚙️")
        ),
        h('main', { className: "flex-1 overflow-y-auto p-6 space-y-6" },
          h('div', { className: "bg-indigo-600 p-8 rounded-[40px] text-white shadow-xl" },
            h('h2', { className: "text-xl font-bold mb-6" }, "พร้อมรับชำระเงิน"),
            h('button', { onClick: () => setIsAddOpen(true), className: "w-full py-4 bg-white/20 rounded-2xl font-bold border border-white/30" }, "+ เพิ่มบัญชี")
          ),
          h('div', { className: "space-y-3" },
            h('h3', { className: "text-xs font-bold text-slate-400 uppercase tracking-widest pl-2" }, "รายการบัญชี"),
            accounts.length === 0 ? h('div', { className: "py-12 text-center text-slate-300 italic bg-white rounded-[32px]" }, "ยังไม่มีข้อมูล") :
            accounts.map(acc => h('button', {
              key: acc.uid,
              onClick: () => { setSelected(acc); setView('input'); },
              className: "w-full bg-white p-6 rounded-[32px] shadow-sm border border-slate-100 flex items-center justify-between"
            }, 
              h('div', { className: "text-left" },
                h('p', { className: "font-bold text-slate-800" }, acc.name),
                h('p', { className: "text-xs text-slate-400" }, acc.id)
              ),
              h('span', { className: "text-xl" }, "📲")
            ))
          )
        ),
        isAddOpen && h('div', { className: "fixed inset-0 z-50 flex items-end bg-slate-900/60 p-4" },
          h('div', { className: "bg-white w-full rounded-[40px] p-8 pb-12 shadow-2xl" },
            h('h3', { className: "text-xl font-bold mb-6" }, "เพิ่มบัญชีใหม่"),
            h('input', { placeholder: "ชื่อบัญชี", className: "w-full p-4 mb-4 bg-slate-50 rounded-2xl border", value: newAcc.name, onChange: e => setNewAcc({...newAcc, name: e.target.value}) }),
            h('input', { placeholder: "เลขพร้อมเพย์", className: "w-full p-4 mb-8 bg-slate-50 rounded-2xl border", value: newAcc.id, onChange: e => setNewAcc({...newAcc, id: e.target.value}) }),
            h('div', { className: "flex gap-4" },
              h('button', { onClick: () => setIsAddOpen(false), className: "flex-1 font-bold text-slate-400" }, "ยกเลิก"),
              h('button', { onClick: () => {
                if(!newAcc.name || !newAcc.id) return;
                const updated = [...accounts, {...newAcc, uid: Date.now()}];
                save(updated);
                setNewAcc({name:'', id:''});
                setIsAddOpen(false);
              }, className: "flex-1 py-4 bg-indigo-600 text-white rounded-2xl font-bold" }, "บันทึก")
            )
          )
        )
      );

      const renderInput = () => h('div', { className: "flex flex-col h-screen bg-white page-in" },
        h('header', { className: "p-6 flex items-center gap-4" },
          h('button', { onClick: () => setView('home'), className: "text-2xl" }, "←"),
          h('h2', { className: "text-xl font-bold" }, "ยอดเงิน")
        ),
        h('main', { className: "flex-1 p-8 flex flex-col items-center justify-center" },
          h('p', { className: "text-slate-400 mb-2" }, "โอนเข้า: " + selected.name),
          h('input', { 
            autoFocus: true, 
            type: "number",
            className: "w-full text-6xl font-bold text-center outline-none text-indigo-600 mb-12", 
            placeholder: "0.00", 
            value: amount, 
            onChange: e => setAmount(e.target.value) 
          }),
          h('button', { onClick: () => setView('qr'), className: "w-full py-5 bg-indigo-600 text-white rounded-[32px] font-bold text-xl" }, "สร้าง QR Code")
        )
      );

      const renderQR = () => {
        const payload = generatePayload(selected.id, amount);
        const qrUrl = "https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=" + encodeURIComponent(payload);
        return h('div', { className: "flex flex-col h-screen bg-slate-900 text-white page-in" },
          h('header', { className: "p-8" }, h('button', { onClick: () => setView('input'), className: "text-2xl" }, "←")),
          h('main', { className: "flex-1 flex flex-col items-center justify-center p-8 text-center" },
            h('div', { className: "bg-white p-6 rounded-[50px] mb-10" }, h('img', { src: qrUrl, className: "w-60 h-60" })),
            h('h3', { className: "text-5xl font-bold mb-2" }, "฿" + (parseFloat(amount) || 0).toLocaleString()),
            h('p', { className: "text-indigo-400 font-bold" }, selected.name)
          ),
          h('footer', { className: "p-8" },
            h('button', { onClick: () => { setView('home'); setAmount(''); }, className: "w-full py-5 bg-white text-slate-900 rounded-[32px] font-bold" }, "เสร็จสิ้น")
          )
        );
      };

      const renderSettings = () => h('div', { className: "flex flex-col h-screen bg-white page-in" },
        h('header', { className: "p-6 flex items-center gap-4 border-b" },
          h('button', { onClick: () => setView('home'), className: "text-2xl" }, "←"),
          h('h2', { className: "text-xl font-bold" }, "ตั้งค่า")
        ),
        h('main', { className: "p-6 space-y-6" },
          h('section', { className: "space-y-4" },
            h('h3', { className: "text-xs font-bold text-slate-400 tracking-widest uppercase" }, "จัดการบัญชี"),
            accounts.map(acc => h('div', { key: acc.uid, className: "flex justify-between p-4 bg-slate-50 rounded-2xl" },
              h('div', null, h('p', { className: "font-bold" }, acc.name), h('p', { className: "text-xs text-slate-400" }, acc.id)),
              h('button', { onClick: () => save(accounts.filter(a => a.uid !== acc.uid)), className: "text-red-500" }, "ลบ")
            ))
          ),
          h('div', { className: "p-8 bg-indigo-50 rounded-[40px] text-center" },
            h('p', { className: "text-indigo-600 font-bold" }, "NattDev Team"),
            h('p', { className: "text-[10px] text-indigo-300 font-bold mt-1" }, "VERSION 3.0.0")
          )
        )
      );

      // --- Main Router ---
      if (view === 'home') return renderHome();
      if (view === 'input') return renderInput();
      if (view === 'qr') return renderQR();
      if (view === 'settings') return renderSettings();
      return h('div', null, "Loading...");
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(h(App));
  </script>
</body>
</html>
